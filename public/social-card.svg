<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" fill="none">
  <defs>
    <!-- Backgrounds -->
    <linearGradient id="sc-bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080B14"/>
      <stop offset=".6" stop-color="#0C0F24"/>
      <stop offset="1" stop-color="#0D102A"/>
    </linearGradient>
    <!-- Brand gradient -->
    <linearGradient id="sc-brand" x1="100" y1="200" x2="980" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <!-- Headline gradient (lighter) -->
    <linearGradient id="sc-head" x1="200" y1="400" x2="880" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset=".45" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <!-- Gold -->
    <linearGradient id="sc-gold" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop stop-color="#FDE068"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="sc-wordgold" x1="470" y1="570" x2="680" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE068"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- Icon bg -->
    <linearGradient id="sc-iconbg" x1="462" y1="345" x2="618" y2="501" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08091C"/>
      <stop offset="1" stop-color="#150830"/>
    </linearGradient>
    <!-- Icon letter grad -->
    <linearGradient id="sc-iconletter" x1="473" y1="361" x2="598" y2="485" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDD6FE"/>
      <stop offset=".45" stop-color="#A5B4FC"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <!-- Ambient glows -->
    <radialGradient id="sc-glow1" cx="200" cy="250" r="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B21B6" stop-opacity=".32"/>
      <stop offset="1" stop-color="#5B21B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sc-glow2" cx="880" cy="830" r="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8" stop-opacity=".22"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sc-glow3" cx="540" cy="540" r="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5" stop-opacity=".07"/>
      <stop offset="1" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <!-- Filters -->
    <filter id="sc-bigblob" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="sc-lglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sc-starglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sc-textglow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="sc-clip"><rect width="1080" height="1080"/></clipPath>
    <clipPath id="sc-iconclip"><rect x="462" y="345" width="156" height="156" rx="36"/></clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BACKGROUND                                              -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect width="1080" height="1080" fill="url(#sc-bg)"/>

  <!-- Ambient blobs -->
  <ellipse cx="200" cy="250" rx="480" ry="400" fill="#5B21B6" opacity=".22"
           filter="url(#sc-bigblob)" clip-path="url(#sc-clip)"/>
  <ellipse cx="880" cy="830" rx="380" ry="320" fill="#1D4ED8" opacity=".18"
           filter="url(#sc-bigblob)" clip-path="url(#sc-clip)"/>
  <ellipse cx="540" cy="540" rx="280" ry="200" fill="#4F46E5" opacity=".07"
           filter="url(#sc-bigblob)" clip-path="url(#sc-clip)"/>

  <!-- Dot grid -->
  <defs>
    <pattern id="sc-dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="rgba(139,92,246,0.11)"/>
    </pattern>
  </defs>
  <rect width="1080" height="1080" fill="url(#sc-dots)" opacity=".65"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1080" height="4" fill="url(#sc-brand)" opacity=".7"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="1076" width="1080" height="4" fill="url(#sc-brand)" opacity=".4"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CONTENT — CENTERED COLUMN                              -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- ── AI Badge ──────────────────────────────────────────── -->
  <!-- Pill: centered, y≈190 -->
  <rect x="382" y="172" width="316" height="42" rx="21"
        fill="rgba(99,102,241,0.13)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
  <text x="540" y="199" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="15" font-weight="700" fill="#818CF8" letter-spacing="1.5">✦  AI PROMO GENERATOR</text>

  <!-- ── Logo / Icon mark ──────────────────────────────────── -->
  <!-- Icon: 156×156 centered at x=462..618, y=255..411 -->
  <rect x="462" y="255" width="156" height="156" rx="36" fill="url(#sc-iconbg)"/>
  <!-- Icon glows -->
  <radialGradient id="sc-ig1" cx="495" cy="285" r="80" gradientUnits="userSpaceOnUse">
    <stop stop-color="#6D28D9" stop-opacity=".5"/>
    <stop offset="1" stop-color="#6D28D9" stop-opacity="0"/>
  </radialGradient>
  <rect x="462" y="255" width="156" height="156" fill="url(#sc-ig1)" clip-path="url(#sc-iconclip)"/>
  <!-- Brand tint -->
  <rect x="462" y="255" width="156" height="156" rx="36" fill="url(#sc-brand)" opacity=".1" clip-path="url(#sc-iconclip)"/>
  <!-- P letterform inside icon (scaled to 156/100=1.56 of favicon) -->
  <!-- Outer: M487,283 L487,386 L511,386 L511,337 ... -->
  <path fill-rule="evenodd"
        fill="url(#sc-iconletter)"
        filter="url(#sc-lglow)"
        d="M 487 283 L 487 386 L 511 386 L 511 337
           L 543 337 Q 576 337 576 310
           Q 576 283 543 283 Z
           M 511 302 L 540 302
           Q 557 302 557 310
           Q 557 318 540 318
           L 511 318 Z"/>
  <!-- Icon border ring -->
  <rect x="462" y="255" width="156" height="156" rx="36"
        fill="none" stroke="url(#sc-brand)" stroke-width="2" opacity=".45"/>
  <!-- Gold sparkle on icon -->
  <g transform="translate(604,268)" filter="url(#sc-starglow)">
    <polygon points="0,-11 2.3,-2.3 11,0 2.3,2.3 0,11 -2.3,2.3 -11,0 -2.3,-2.3"
             fill="url(#sc-gold)"/>
  </g>

  <!-- ── Wordmark ──────────────────────────────────────────── -->
  <!-- "PromoGen" centered, y≈490 -->
  <!-- "Promo" white + "Gen" gold, large -->
  <text x="540" y="508" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="72" font-weight="900" fill="white" letter-spacing="-2.5"
        filter="url(#sc-textglow)">Promo<tspan fill="url(#sc-wordgold)">Gen</tspan></text>

  <!-- BY 4OURMEDIA -->
  <text x="540" y="537" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="14" font-weight="600" fill="#475569" letter-spacing="3.5">BY 4OURMEDIA</text>

  <!-- ── Divider ───────────────────────────────────────────── -->
  <line x1="290" y1="568" x2="790" y2="568" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>

  <!-- ── Main tagline ───────────────────────────────────────── -->
  <text x="540" y="636" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="36" font-weight="700" fill="white" letter-spacing="-0.5">Turn any product URL into</text>
  <text x="540" y="684" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="36" font-weight="700" fill="url(#sc-head)" letter-spacing="-0.5">a viral promo in 10 seconds.</text>

  <!-- ── Feature pills row ─────────────────────────────────── -->
  <!-- 3 pills centered, y≈748 -->
  <!-- Pill 1: AI Copy -->
  <rect x="170" y="726" width="200" height="44" rx="10"
        fill="rgba(124,58,237,0.18)" stroke="rgba(124,58,237,0.35)" stroke-width="1.5"/>
  <text x="270" y="754" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="600" fill="#C4B5FD">⚡ AI Copywriting</text>
  <!-- Pill 2: Templates -->
  <rect x="390" y="726" width="200" height="44" rx="10"
        fill="rgba(79,70,229,0.18)" stroke="rgba(79,70,229,0.35)" stroke-width="1.5"/>
  <text x="490" y="754" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="600" fill="#A5B4FC">🎨 11 Templates</text>
  <!-- Pill 3: Platforms -->
  <rect x="610" y="726" width="200" height="44" rx="10"
        fill="rgba(37,99,235,0.18)" stroke="rgba(37,99,235,0.35)" stroke-width="1.5"/>
  <text x="710" y="754" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="600" fill="#93C5FD">📱 5 Platforms</text>

  <!-- ── Social proof ──────────────────────────────────────── -->
  <text x="540" y="842" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="26" fill="#F59E0B" letter-spacing="4">★★★★★</text>
  <text x="540" y="878" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="17" font-weight="500" fill="#64748B">Trusted by
    <tspan font-weight="700" fill="#94A3B8"> 2,800+ marketers</tspan>
  </text>

  <!-- ── Try free CTA ──────────────────────────────────────── -->
  <rect x="340" y="910" width="400" height="64" rx="32" fill="url(#sc-brand)"/>
  <text x="540" y="950" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="800" fill="white" letter-spacing=".5">Try Free — 3 Generations</text>

  <!-- ── URL ───────────────────────────────────────────────── -->
  <text x="540" y="1010" text-anchor="middle"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="15" font-weight="500" fill="#334155" letter-spacing="1">4ourmedia.com</text>

  <!-- ── Decorative sparkles ───────────────────────────────── -->
  <g transform="translate(100,140)" filter="url(#sc-starglow)">
    <polygon points="0,-18 4,-4 18,0 4,4 0,18 -4,4 -18,0 -4,-4"
             fill="rgba(167,139,250,0.3)"/>
  </g>
  <g transform="translate(980,940)" filter="url(#sc-starglow)">
    <polygon points="0,-16 3.4,-3.4 16,0 3.4,3.4 0,16 -3.4,3.4 -16,0 -3.4,-3.4"
             fill="rgba(167,139,250,0.25)"/>
  </g>
  <g transform="translate(60,700)">
    <polygon points="0,-10 2.2,-2.2 10,0 2.2,2.2 0,10 -2.2,2.2 -10,0 -2.2,-2.2"
             fill="rgba(245,158,11,0.3)"/>
  </g>
  <g transform="translate(1020,380)">
    <polygon points="0,-10 2.2,-2.2 10,0 2.2,2.2 0,10 -2.2,2.2 -10,0 -2.2,-2.2"
             fill="rgba(167,139,250,0.2)"/>
  </g>
</svg>
