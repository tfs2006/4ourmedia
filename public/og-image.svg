<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="og-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080B14"/>
      <stop offset="1" stop-color="#0D102A"/>
    </linearGradient>
    <linearGradient id="og-brand" x1="100" y1="140" x2="520" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="og-headgrad" x1="80" y1="0" x2="440" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset=".5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="og-gold" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="og-card" x1="740" y1="80" x2="1080" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4338CA"/>
      <stop offset=".5" stop-color="#5B21B6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="og-cardbadge" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="og-iconbg" x1="74" y1="30" x2="126" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0E1F"/>
      <stop offset="1" stop-color="#1A0B38"/>
    </linearGradient>
    <linearGradient id="og-iconbrand" x1="74" y1="30" x2="126" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="og-divider" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="rgba(99,102,241,0)" />
      <stop offset=".5" stop-color="rgba(99,102,241,0.35)"/>
      <stop offset="1" stop-color="rgba(99,102,241,0)"/>
    </linearGradient>
    <linearGradient id="og-cardinnershine" x1="740" y1="80" x2="900" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity=".18"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Filters -->
    <filter id="og-bigblob" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="og-medblob" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="og-cardglow" x="-30%" y="-20%" width="160%" height="140%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="og-starglow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="og-pglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="og-clip"><rect width="1200" height="630"/></clipPath>
    <clipPath id="og-cardclip"><rect x="738" y="76" width="344" height="480" rx="28"/></clipPath>
    <clipPath id="og-iconclip"><rect x="74" y="30" width="52" height="52" rx="12"/></clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BACKGROUND                                              -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Ambient glow — top-left purple blob -->
  <ellipse cx="240" cy="200" rx="350" ry="280" fill="#5B21B6" opacity=".22" filter="url(#og-bigblob)" clip-path="url(#og-clip)"/>
  <!-- Ambient glow — bottom-right blue blob -->
  <ellipse cx="1020" cy="460" rx="280" ry="220" fill="#1D4ED8" opacity=".18" filter="url(#og-bigblob)" clip-path="url(#og-clip)"/>
  <!-- Accent glow — centre -->
  <ellipse cx="600" cy="315" rx="200" ry="140" fill="#4F46E5" opacity=".08" filter="url(#og-medblob)" clip-path="url(#og-clip)"/>

  <!-- Subtle dot grid (every 36px) -->
  <defs>
    <pattern id="og-dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1" fill="rgba(139,92,246,0.12)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#og-dots)" opacity=".7"/>

  <!-- Vertical divider line -->
  <line x1="686" y1="60" x2="686" y2="570"
        stroke="url(#og-divider)" stroke-width="1" opacity=".6"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEFT COLUMN (x: 80–640)                                -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Brand icon (52×52) -->
  <rect x="74" y="30" width="52" height="52" rx="12" fill="url(#og-iconbg)"/>
  <rect x="74" y="30" width="52" height="52" rx="12" fill="url(#og-iconbrand)" opacity=".11" clip-path="url(#og-iconclip)"/>
  <ellipse cx="100" cy="57" rx="20" ry="16" fill="#6D28D9" opacity=".3" filter="url(#og-medblob)" clip-path="url(#og-iconclip)"/>
  <!-- P inside icon -->
  <path d="M85,71 L85,40 L102,40 Q114,40 114,48.5 Q114,57 102,57 L93,57 L93,71 Z"
        fill="white" opacity=".95" filter="url(#og-pglow)" clip-path="url(#og-iconclip)"/>
  <rect x="74" y="30" width="52" height="52" rx="12" fill="none" stroke="url(#og-iconbrand)" stroke-width=".9" opacity=".45"/>
  <!-- Icon sparkle -->
  <g transform="translate(118,36)">
    <polygon points="0,-3 0.7,-0.7 3,0 0.7,0.7 0,3 -0.7,0.7 -3,0 -0.7,-0.7"
             fill="#F59E0B" opacity=".9"/>
  </g>

  <!-- "PromoGen" wordmark next to icon -->
  <text x="138" y="58"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="800" fill="white" letter-spacing="-.5">Promo</text>
  <text x="214" y="58"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="800" fill="#F59E0B" letter-spacing="-.5">Gen</text>
  <text x="139" y="72"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="7.5" font-weight="600" fill="#475569" letter-spacing="2.2">BY 4OURMEDIA</text>

  <!-- Badge pill -->
  <rect x="80" y="118" width="244" height="34" rx="17" fill="rgba(99,102,241,0.13)" stroke="rgba(99,102,241,0.38)" stroke-width="1"/>
  <text x="100" y="140"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="700" fill="#818CF8" letter-spacing="1">✦  AI-POWERED MARKETING TOOL</text>

  <!-- Main headline -->
  <text x="80" y="248"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="88" font-weight="900" fill="white" letter-spacing="-4">Promo</text>
  <text x="80" y="338"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="88" font-weight="900" letter-spacing="-4"
        fill="url(#og-headgrad)">Gen.</text>

  <!-- Tagline -->
  <text x="82" y="388"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="400" fill="#94A3B8">Turn any product URL into a scroll-stopping</text>
  <text x="82" y="416"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="400" fill="#94A3B8">promo with AI copy &amp; cinematic visuals.</text>

  <!-- Feature chips -->
  <rect x="80" y="444" width="134" height="32" rx="8" fill="rgba(124,58,237,0.18)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="97" y="465"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="600" fill="#C4B5FD">⚡ AI Copywriting</text>

  <rect x="224" y="444" width="128" height="32" rx="8" fill="rgba(79,70,229,0.18)" stroke="rgba(79,70,229,0.3)" stroke-width="1"/>
  <text x="241" y="465"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="600" fill="#A5B4FC">🎨 Visual Gen</text>

  <rect x="362" y="444" width="116" height="32" rx="8" fill="rgba(37,99,235,0.18)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
  <text x="379" y="465"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="600" fill="#93C5FD">⚡ 10 Seconds</text>

  <!-- Star rating + social proof -->
  <text x="80" y="524"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="20" fill="#F59E0B">★★★★★</text>
  <text x="190" y="524"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="15" font-weight="500" fill="#64748B">Trusted by </text>
  <text x="271" y="524"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="15" font-weight="700" fill="#94A3B8">2,800+ marketers</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RIGHT COLUMN — Mock Promo Card                         -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Card glow shadow -->
  <rect x="738" y="76" width="344" height="480" rx="28"
        fill="url(#og-card)" opacity=".5" filter="url(#og-cardglow)"/>

  <!-- Card body -->
  <rect x="738" y="76" width="344" height="480" rx="28" fill="url(#og-card)"/>

  <!-- Card inner highlight shine -->
  <path d="M738,76 L1082,76 Q1082,76 1060,120 Q1020,156 980,156 L738,156 Z"
        fill="url(#og-cardinnershine)" clip-path="url(#og-cardclip)"/>

  <!-- Card top-right ambient circle -->
  <circle cx="1100" cy="60" r="120" fill="white" opacity=".06" clip-path="url(#og-cardclip)"/>

  <!-- Card border -->
  <rect x="738" y="76" width="344" height="480" rx="28"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- BEST DEAL badge on card -->
  <rect x="762" y="108" width="112" height="26" rx="13" fill="url(#og-cardbadge)"/>
  <text x="785" y="126"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="11.5" font-weight="800" fill="#1C1400" letter-spacing="1">✦ BEST DEAL</text>

  <!-- Big discount number -->
  <text x="762" y="232"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="100" font-weight="900" fill="white" letter-spacing="-5" opacity=".97">60%</text>
  <text x="764" y="268"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="24" font-weight="700" fill="rgba(255,255,255,0.85)">OFF TODAY</text>
  <text x="764" y="292"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="400" fill="rgba(255,255,255,0.45)">Limited time · While stocks last</text>

  <!-- Product placeholder box -->
  <rect x="762" y="312" width="296" height="148" rx="16"
        fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <!-- Placeholder shimmer lines -->
  <rect x="786" y="348" width="100" height="10" rx="5" fill="rgba(255,255,255,0.14)"/>
  <rect x="786" y="368" width="160" height="8" rx="4" fill="rgba(255,255,255,0.09)"/>
  <rect x="786" y="384" width="70" height="8" rx="4" fill="rgba(255,255,255,0.07)"/>
  <!-- Product icon placeholder -->
  <text x="960" y="396"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="48" fill="rgba(255,255,255,0.2)" text-anchor="middle">✦</text>

  <!-- CTA Button -->
  <rect x="762" y="476" width="296" height="52" rx="14"
        fill="white"/>
  <text x="910" y="508"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="800" fill="#4338CA" text-anchor="middle"
        letter-spacing="0.5">SHOP NOW  →</text>

  <!-- Sparkle accents on card -->
  <g transform="translate(1060,104)" filter="url(#og-starglow)">
    <polygon points="0,-6 1.4,-1.4 6,0 1.4,1.4 0,6 -1.4,1.4 -6,0 -1.4,-1.4"
             fill="rgba(255,255,255,0.55)"/>
  </g>
  <g transform="translate(757,440)">
    <polygon points="0,-3.5 0.8,-0.8 3.5,0 0.8,0.8 0,3.5 -0.8,0.8 -3.5,0 -0.8,-0.8"
             fill="rgba(255,255,255,0.25)"/>
  </g>
  <g transform="translate(1074,310)">
    <polygon points="0,-2.5 0.6,-0.6 2.5,0 0.6,0.6 0,2.5 -0.6,0.6 -2.5,0 -0.6,-0.6"
             fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- "Sample AI Output" label under card -->
  <text x="910" y="588"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="500" fill="#334155" text-anchor="middle"
        letter-spacing="0.5">✦  SAMPLE AI OUTPUT</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BOTTOM BAR                                             -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="82" y="605"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="500" fill="#334155" letter-spacing=".5">4ourmedia.com</text>

  <!-- Decorative top-right large sparkle -->
  <g transform="translate(1152,38)" filter="url(#og-starglow)">
    <polygon points="0,-10 2.4,-2.4 10,0 2.4,2.4 0,10 -2.4,2.4 -10,0 -2.4,-2.4"
             fill="rgba(167,139,250,0.35)"/>
  </g>
  <g transform="translate(1130,68)">
    <polygon points="0,-4 0.9,-0.9 4,0 0.9,0.9 0,4 -0.9,0.9 -4,0 -0.9,-0.9"
             fill="rgba(167,139,250,0.2)"/>
  </g>
</svg>
