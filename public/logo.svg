<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon mark (42x42) -->
  <rect x="0" y="9" width="42" height="42" rx="10" fill="url(#logoGrad)"/>
  <!-- Aperture blades -->
  <g transform="translate(21,30)" filter="url(#logoGlow)">
    <ellipse cx="0" cy="-7" rx="2.5" ry="5" fill="url(#goldGrad)" opacity="0.9" transform="rotate(0)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="5" fill="url(#goldGrad)" opacity="0.9" transform="rotate(60)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="5" fill="url(#goldGrad)" opacity="0.9" transform="rotate(120)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="5" fill="url(#goldGrad)" opacity="0.9" transform="rotate(180)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="5" fill="url(#goldGrad)" opacity="0.9" transform="rotate(240)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="5" fill="url(#goldGrad)" opacity="0.9" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.95"/>
  </g>
  <!-- Sparkle top-right of icon -->
  <g transform="translate(37,14)" fill="white" opacity="0.7">
    <polygon points="0,-3 0.5,-0.5 3,0 0.5,0.5 0,3 -0.5,0.5 -3,0 -0.5,-0.5"/>
  </g>

  <!-- Wordmark: "Promo" -->
  <text x="52" y="36" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="-0.5">Promo</text>
  <!-- Wordmark: "Gen" in gradient -->
  <text x="120" y="36" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="800" fill="url(#goldGrad)" letter-spacing="-0.5">Gen</text>
  <!-- Sub-label -->
  <text x="52" y="48" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="500" fill="#94A3B8" letter-spacing="2">BY 4OURMEDIA</text>
</svg>
