<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 66" fill="none">
  <defs>
    <!-- Icon bg -->
    <linearGradient id="lg-bg" x1="0" y1="7" x2="52" y2="59" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08091C"/>
      <stop offset="1" stop-color="#150830"/>
    </linearGradient>
    <!-- Brand gradient (for tint + border) -->
    <linearGradient id="lg-brand" x1="0" y1="7" x2="52" y2="59" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <!-- Letter gradient -->
    <linearGradient id="lg-letter" x1="8" y1="14" x2="38" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDD6FE"/>
      <stop offset=".45" stop-color="#A5B4FC"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <!-- Gold for sparkle + "Gen" wordmark -->
    <linearGradient id="lg-gold" x1="40" y1="12" x2="46" y2="17" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE068"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="lg-wordgold" x1="148" y1="28" x2="185" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE068"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- Ambient glows for icon -->
    <radialGradient id="lg-glow1" cx="13" cy="24" r="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6D28D9" stop-opacity=".5"/>
      <stop offset="1" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lg-glow2" cx="42" cy="50" r="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8" stop-opacity=".3"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>
    <filter id="lg-starglow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lg-lglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="lg-iconclip">
      <rect x="0" y="7" width="52" height="52" rx="12"/>
    </clipPath>
  </defs>
    <filter id="lg-starglow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="lg-iconclip">
      <rect x="0" y="7" width="52" height="52" rx="12"/>
    </clipPath>
  </defs>

  <!-- ── Icon Mark (52×52 at y=7) ─────────────────────────── -->
  <rect x="0" y="7" width="52" height="52" rx="12" fill="url(#lg-bg)"/>
  <!-- Ambient glows -->
  <rect x="0" y="7" width="52" height="52" fill="url(#lg-glow1)" clip-path="url(#lg-iconclip)"/>
  <rect x="0" y="7" width="52" height="52" fill="url(#lg-glow2)" clip-path="url(#lg-iconclip)"/>
  <!-- Brand tint -->
  <rect x="0" y="7" width="52" height="52" rx="12" fill="url(#lg-brand)" opacity=".09" clip-path="url(#lg-iconclip)"/>
  <!-- P letterform: gradient fill, fill-rule evenodd punches the bowl hole -->
  <!-- Outer: stem(8,14→8,52→16,52→16,35), bowl arc right to x=38, back to (27,14) -->
  <!-- Inner hole: (16,20)→(26,20) arc right to (32,24) arc back to (26,28)→(16,28) -->
  <path fill-rule="evenodd"
        fill="url(#lg-letter)"
        filter="url(#lg-lglow)"
        d="M 8 14 L 8 52 L 16 52 L 16 35 L 27 35
           Q 38 35 38 24
           Q 38 14 27 14 Z
           M 16 20 L 26 20
           Q 32 20 32 24
           Q 32 28 26 28
           L 16 28 Z"/>
  <!-- Border ring -->
  <rect x="0" y="7" width="52" height="52" rx="12" fill="none" stroke="url(#lg-brand)" stroke-width=".9" opacity=".45"/>
  <!-- Gold sparkle (top-right of icon) -->
  <g transform="translate(43,13)" filter="url(#lg-starglow)">
    <polygon points="0,-3.8 0.8,-0.8 3.8,0 0.8,0.8 0,3.8 -0.8,0.8 -3.8,0 -0.8,-0.8"
             fill="url(#lg-gold)"/>
  </g>

  <!-- ── Wordmark ──────────────────────────────────────────── -->
  <!-- "Promo" in white -->
  <text x="62" y="41"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="26" font-weight="800" fill="white" letter-spacing="-0.6">Promo</text>
  <!-- "Gen" in gold gradient -->
  <text x="148" y="41"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="26" font-weight="800" fill="url(#lg-wordgold)" letter-spacing="-0.6">Gen</text>
  <!-- Sub-label "BY 4OURMEDIA" -->
  <text x="63" y="54"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" font-weight="600" fill="#64748B" letter-spacing="2.2">BY 4OURMEDIA</text>
</svg>
