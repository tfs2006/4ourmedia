<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 66" fill="none">
  <defs>
    <linearGradient id="lg-bg" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0E1F"/>
      <stop offset="1" stop-color="#1A0B38"/>
    </linearGradient>
    <linearGradient id="lg-brand" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="lg-gold" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="lg-wordgold" x1="118" y1="0" x2="162" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="lg-shine" x1="7" y1="7" x2="7" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity=".16"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="lg-pglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lg-blob" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="lg-starglow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="lg-iconclip">
      <rect x="0" y="7" width="52" height="52" rx="12"/>
    </clipPath>
  </defs>

  <!-- ── Icon Mark (52×52 at y=7) ─────────────────────────── -->
  <rect x="0" y="7" width="52" height="52" rx="12" fill="url(#lg-bg)"/>
  <rect x="0" y="7" width="52" height="52" rx="12" fill="url(#lg-brand)" opacity=".11" clip-path="url(#lg-iconclip)"/>
  <!-- Ambient glow -->
  <ellipse cx="26" cy="32" rx="20" ry="17" fill="#6D28D9" opacity=".3" filter="url(#lg-blob)" clip-path="url(#lg-iconclip)"/>
  <!-- P letterform inside icon -->
  <path d="M11,50 L11,16 L28,16 Q40,16 40,24.5 Q40,33 28,33 L19,33 L19,50 Z"
        fill="white" opacity=".95" filter="url(#lg-pglow)" clip-path="url(#lg-iconclip)"/>
  <!-- Top-shine on P -->
  <path d="M11,16 L28,16 Q39,16 40,22 Q34,18 28,18 L11,18 Z"
        fill="url(#lg-shine)" clip-path="url(#lg-iconclip)"/>
  <!-- Border ring -->
  <rect x="0" y="7" width="52" height="52" rx="12" fill="none" stroke="url(#lg-brand)" stroke-width=".9" opacity=".45"/>
  <!-- Gold sparkle (top-right of icon) -->
  <g transform="translate(42,13)" filter="url(#lg-starglow)">
    <polygon points="0,-3.2 0.75,-0.75 3.2,0 0.75,0.75 0,3.2 -0.75,0.75 -3.2,0 -0.75,-0.75"
             fill="url(#lg-gold)" opacity=".96"/>
  </g>

  <!-- ── Wordmark ──────────────────────────────────────────── -->
  <!-- "Promo" in white -->
  <text x="62" y="42"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="26" font-weight="800" fill="white" letter-spacing="-0.6">Promo</text>
  <!-- "Gen" in gold gradient -->
  <text x="146" y="42"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="26" font-weight="800" fill="url(#lg-wordgold)" letter-spacing="-0.6">Gen</text>
  <!-- Sub-label "BY 4OURMEDIA" -->
  <text x="63" y="55"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" font-weight="600" fill="#64748B" letter-spacing="2.2">BY 4OURMEDIA</text>
</svg>
