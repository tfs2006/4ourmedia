<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="aperture" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Aperture ring blades -->
  <g transform="translate(50,50)" filter="url(#glow)">
    <!-- 6 aperture blades -->
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#aperture)" opacity="0.9" transform="rotate(0)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#aperture)" opacity="0.9" transform="rotate(60)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#aperture)" opacity="0.9" transform="rotate(120)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#aperture)" opacity="0.9" transform="rotate(180)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#aperture)" opacity="0.9" transform="rotate(240)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#aperture)" opacity="0.9" transform="rotate(300)"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.95"/>
    <!-- Inner P letter -->
    <text x="0" y="5" font-size="10" text-anchor="middle" fill="#4F46E5" font-weight="900" font-family="system-ui, sans-serif">P</text>
  </g>
  <!-- Sparkle top-right -->
  <g transform="translate(78,20)" fill="white" opacity="0.8">
    <polygon points="0,-5 1,-1 5,0 1,1 0,5 -1,1 -5,0 -1,-1" />
  </g>
  <!-- Sparkle bottom-left -->
  <g transform="translate(22,80)" fill="white" opacity="0.5">
    <polygon points="0,-3 0.7,-0.7 3,0 0.7,0.7 0,3 -0.7,0.7 -3,0 -0.7,-0.7" />
  </g>
</svg>
